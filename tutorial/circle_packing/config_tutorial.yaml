# Tutorial config for circle packing (n=26), verified against OpenEvolve 0.3.0.
#
# Key choices for the tutorial:
#  - cascade_evaluation: false  -> the single evaluate() path is used, so the
#    RAW-score change in evaluator.py actually takes effect. (Under cascade,
#    the engine would call evaluate_stage1/2 and bypass evaluate().)
#  - api_key: "ollama"          -> avoids depending on OPENAI_API_KEY being
#    propagated into the dashboard's subprocess environment.
#  - num_islands / parallel_evaluations = 1 -> ~1 in-flight LLM request per
#    participant, so 20 concurrent runs stay tractable on one Ollama server.

max_iterations: 10
checkpoint_interval: 1
log_level: "INFO"

llm:
  primary_model: "gpt-oss:20b"
  primary_model_weight: 1.0
  api_base: "http://localhost:11434/v1"
  api_key: "ollama"
  temperature: 0.7
  top_p: 0.95
  max_tokens: 2048
  timeout: 600

prompt:
  system_message: |
    You are an expert mathematician specializing in circle packing problems
    and computational geometry. Improve a constructor function that produces
    26 circles in a unit square, maximizing the sum of their radii. Keep the
    output as valid Python code and preserve the run_packing() interface.
  num_top_programs: 3
  use_template_stochasticity: true

database:
  population_size: 20
  archive_size: 10
  num_islands: 1
  elite_selection_ratio: 0.3
  exploitation_ratio: 0.7

evaluator:
  timeout: 60
  # Single scoring path. evaluator.py defines only evaluate() (no stage
  # functions), and combined_score is the raw sum_radii, so cascade would add
  # nothing but the risk of scoring on the wrong (bypassed) function.
  cascade_evaluation: false
  parallel_evaluations: 1
  use_llm_feedback: false

diff_based_evolution: false
allow_full_rewrites: true
